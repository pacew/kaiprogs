# kai-proxy domain allowlist
# One pattern per line. Comments start with #.
# *.foo.com matches foo.com and any subdomain.
# Exact names also match.
#
# Run kai-proxy --discover to log all domains the container reaches,
# then add any missing ones here.

# Anthropic: API and all Claude Code services
*.anthropic.com
anthropic.com

# GitHub: git pull operations
*.github.com
github.com
*.githubusercontent.com
